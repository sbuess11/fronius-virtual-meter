name: "Fronius Virtual Meter"
version: "0.1.0"
slug: "fronius_virtual_meter"
description: "Virtueller Fronius TCP-Primärzähler für Testzwecke"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
host_network: true
init: false
options:
  bind_port: 1502
  dummy_power_w: 1000
schema:
  bind_port: int(1,65535)
  dummy_power_w: int(-50000,50000)
